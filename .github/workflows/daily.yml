name: Daily YouTube Shorts Generator

on:
  schedule:
    # 7 PM IST is 13:30 UTC
    - cron: "30 13 * * *"
  workflow_dispatch: # Allows manual trigger

jobs:
  build-and-upload:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"
          cache: "pip"
          
      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg imagemagick sqlite3 libespeak1
          # Fix ImageMagick policy to allow text rendering for moviepy
          sudo sed -i 's/none/read,write/g' /etc/ImageMagick-6/policy.xml || true
          
      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          
      - name: Run Automation Script
        env:
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
        run: |
          python main.py
          
      - name: Upload Database as Artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: sqlite-database
          path: youtube_automation.db
